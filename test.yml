version: 1

baseUrl: ${BASE_URL}

tests:
  # -------------------------
  # MIXED VALIDATIONS
  # -------------------------
  - name: User Basic Validation
    request:
      method: GET
      url: /users/${USER_ID}
    expect:
      status: 200
      body:
        equals:
          id: 1

  - name: User Contains Validation
    request:
      method: GET
      url: /users/1
    expect:
      status: 200
      body:
        contains: "Leanne"

  # -------------------------
  # CHANGING RESPONSE SIZE
  # -------------------------
  - name: Posts List - Large Response
    request:
      method: GET
      url: /posts
    expect:
      status: 200
      responseTime: 1000

  - name: Comments Query Dynamic
    request:
      method: GET
      url: /comments
      query:
        postId: 2
    expect:
      status: 200

  # -------------------------
  # MULTIPLE METHODS SAME RESOURCE
  # -------------------------
  - name: Create User Dynamic
    request:
      method: POST
      url: /users
      body:
        name: ${NAME}
        timestamp: 123456
    expect:
      status: 201

  - name: Update User Dynamic
    request:
      method: PUT
      url: /users/1
      body:
        name: "Updated Dynamic"
    expect:
      status: 200

  - name: Patch User Dynamic
    request:
      method: PATCH
      url: /users/1
      body:
        updated: true
    expect:
      status: 200

  # -------------------------
  # EDGE CASES
  # -------------------------
  - name: Empty Query
    request:
      method: GET
      url: /posts
      query: {}
    expect:
      status: 200

  - name: Non Existing Route
    request:
      method: GET
      url: /this-route-does-not-exist
    expect:
      status: 404

  # -------------------------
  # COMBINED VALIDATION
  # -------------------------
  - name: Combined Status + Body + Performance
    request:
      method: GET
      url: /users/2
    expect:
      status: 200
      responseTime: 800
      body:
        equals:
          id: 2

  # -------------------------
  # FAILURE SCENARIOS
  # -------------------------
  - name: Wrong Body Expectation
    request:
      method: GET
      url: /users/1
    expect:
      status: 200
      body:
        equals:
          id: 999

  - name: Wrong Status Expectation
    request:
      method: GET
      url: /users
    expect:
      status: 500

  # -------------------------
  # MULTIPLE QUICK CALLS (simulate load)
  # -------------------------
  - name: Quick Call 1
    request:
      method: GET
      url: /albums
    expect:
      status: 200

  - name: Quick Call 2
    request:
      method: GET
      url: /albums
    expect:
      status: 200

  - name: Quick Call 3
    request:
      method: GET
      url: /albums
    expect:
      status: 200

  # -------------------------
  # STRING VARIATION TEST
  # -------------------------
  - name: Case Sensitive Contains
    request:
      method: GET
      url: /users/1
    expect:
      status: 200
      body:
        contains: "leanne graham"  # should FAIL (case mismatch)

  # -------------------------
  # STRESS BODY CHECK
  # -------------------------
  - name: Deep Field Check
    request:
      method: GET
      url: /users/1
    expect:
      status: 200
      body:
        equals:
          address:
            geo:
              lat: "-37.3159"

  # -------------------------
  # EXTRACTION + DEPENDENCY FLOW
  # -------------------------

  - name: Extract User From API
    request:
      method: GET
      url: /users/1
    expect:
      status: 200
    extract:
      extractedUserId: $.id
      extractedUserName: $.name

  - name: Use Extracted User ID
    request:
      method: GET
      url: /users/${extractedUserId}
    expect:
      status: 200
      body:
        equals:
          id: 1

  # -------------------------
  # CHAINING MULTIPLE VALUES
  # -------------------------

  - name: Extract First Post
    request:
      method: GET
      url: /posts/1
    expect:
      status: 200
    extract:
      postId: $.id
      postTitle: $.title

  - name: Use Extracted Post
    request:
      method: GET
      url: /posts/${postId}
    expect:
      status: 200

  # -------------------------
  # ARRAY EXTRACTION
  # -------------------------

  - name: Extract First User From List
    request:
      method: GET
      url: /users
    expect:
      status: 200
    extract:
      firstUserId: $[0].id

  - name: Use First User From Array
    request:
      method: GET
      url: /users/${firstUserId}
    expect:
      status: 200

  # -------------------------
  # VARIABLE OVERWRITE TEST
  # -------------------------

  - name: Extract User A (will be overwritten)
    request:
      method: GET
      url: /users/1
    expect:
      status: 200
    extract:
      userId: $.id

  - name: Extract User B (overwrite userId)
    request:
      method: GET
      url: /users/2
    expect:
      status: 200
    extract:
      userId: $.id

  - name: Use Overwritten userId
    request:
      method: GET
      url: /users/${userId}
    expect:
      status: 200
      body:
        equals:
          id: 2

  # -------------------------
  # ENV vs CONTEXT PRIORITY TEST
  # -------------------------

  - name: Context Overrides Env
    request:
      method: GET
      url: /users/3
    expect:
      status: 200
    extract:
      USER_ID: $.id   # same name as env var

  - name: Use USER_ID (should use context, not env)
    request:
      method: GET
      url: /users/${USER_ID}
    expect:
      status: 200
      body:
        equals:
          id: 3

  # -------------------------
  # FAILURE: INVALID EXTRACTION PATH
  # -------------------------

  - name: Broken Extraction Path
    request:
      method: GET
      url: /users/1
    expect:
      status: 200
    extract:
      brokenField: $.this.path.does.not.exist

  # -------------------------
  # FAILURE: USING VARIABLE BEFORE DEFINITION
  # -------------------------

  - name: Use Undefined Variable
    request:
      method: GET
      url: /users/${undefinedVar}
    expect:
      status: 404