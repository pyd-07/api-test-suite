version: 1

baseUrl: https://jsonplaceholder.typicode.com

tests:
  # -------------------------
  # BASIC GET
  # -------------------------
  - name: Get All Users
    request:
      method: GET
      url: /users
    expect:
      status: 200

  - name: Get Single User
    request:
      method: GET
      url: /users/1
      timeout: 100
    expect:
      status: 200
      body:
        contains: "Leanne Graham"

  - name: Invalid User
    request:
      method: GET
      url: /users/9999
    expect:
      status: 404

  # -------------------------
  # QUERY PARAMS
  # -------------------------
  - name: Get Posts by User
    request:
      method: GET
      url: /posts
      query:
        userId: 1
    expect:
      status: 200

  # -------------------------
  # POST (BODY + HEADERS)
  # -------------------------
  - name: Create User
    request:
      method: POST
      url: /users
      headers:
        Content-Type: application/json
      body:
        name: "Piyush"
        username: "asura"
    expect:
      status: 201
      body:
        contains: "id"

  # -------------------------
  # PUT / PATCH / DELETE
  # -------------------------
  - name: Update User
    request:
      method: PUT
      url: /users/1
      headers:
        Content-Type: application/json
      body:
        name: "Updated Name"
    expect:
      status: 200

  - name: Patch User
    request:
      method: PATCH
      url: /users/1
      headers:
        Content-Type: application/json
      body:
        name: "Patched Name"
    expect:
      status: 200

  - name: Delete User
    request:
      method: DELETE
      url: /users/1
    expect:
      status: 200

  # -------------------------
  # RESPONSE TIME CHECKS
  # -------------------------
  - name: Performance Check (Loose)
    request:
      method: GET
      url: /posts
    expect:
      status: 200
      responseTime: 800   # should PASS

  - name: Performance Check (Strict)
    request:
      method: GET
      url: /posts
    expect:
      status: 200
      responseTime: 50    # should DELAY

  # -------------------------
  # BODY EQUALS (STRICT MATCH)
  # -------------------------
  - name: Exact Body Match (Will Likely Fail)
    request:
      method: GET
      url: /users/1
    expect:
      status: 200
      body:
        equals:
          id: 1
          name: "Leanne Graham"

  # -------------------------
  # INTENTIONAL FAILURES
  # -------------------------
  - name: Wrong Status Expectation
    request:
      method: GET
      url: /users
    expect:
      status: 404

  - name: Missing Endpoint
    request:
      method: GET
      url: /non-existent-route
    expect:
      status: 404

  - name: Body Contains Failure
    request:
      method: GET
      url: /users/1
    expect:
      status: 200
      body:
        contains: "THIS_WILL_NOT_EXIST"